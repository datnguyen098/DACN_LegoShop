<div id="main" xmlns:th="http://www.thymeleaf.org">
    <header class="mb-3">
        <a href="#" class="burger-btn d-block d-xl-none">
            <i class="bi bi-justify fs-3"></i>
        </a>
    </header>

    <div class="page-heading">
        <h3>Tổng quan cửa hàng LEGO</h3>
        <p class="text-muted mb-0">
            Thống kê từ database —
            <span th:text="${stats.tongDonHang}">0</span> đơn hàng,
            <span th:text="${stats.tongSanPham}">0</span> sản phẩm,
            <span th:text="${stats.tongKhachHang}">0</span> khách hàng
        </p>
    </div>

    <div class="page-content">
        <section class="row g-3">
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100">
                    <div class="card-body px-4 py-4">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon purple flex-shrink-0">
                                <i class="bi bi-stack"></i>
                            </div>
                            <div class="ms-3">
                                <h6 class="text-muted font-semibold mb-1">Danh mục</h6>
                                <h4 class="font-extrabold mb-0" th:text="${stats.tongDanhMuc}">0</h4>
                                <small class="text-muted">Đang dùng: <span th:text="${stats.danhMucDangDung}">0</span></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100">
                    <div class="card-body px-4 py-4">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon blue flex-shrink-0">
                                <i class="bi bi-box-seam-fill"></i>
                            </div>
                            <div class="ms-3">
                                <h6 class="text-muted font-semibold mb-1">Sản phẩm đang bán</h6>
                                <h4 class="font-extrabold mb-0" th:text="${stats.sanPhamDangBan}">0</h4>
                                <small class="text-muted">Tổng: <span th:text="${stats.tongSanPham}">0</span></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100">
                    <div class="card-body px-4 py-4">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon green flex-shrink-0">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <div class="ms-3">
                                <h6 class="text-muted font-semibold mb-1">Khách hàng</h6>
                                <h4 class="font-extrabold mb-0" th:text="${stats.tongKhachHang}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100">
                    <div class="card-body px-4 py-4">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon red flex-shrink-0">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                            </div>
                            <div class="ms-3">
                                <h6 class="text-muted font-semibold mb-1">Tồn kho thấp (&lt;10)</h6>
                                <h4 class="font-extrabold mb-0" th:text="${stats.tonKhoThap}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body py-4 text-center">
                        <i class="bi bi-hourglass-split text-warning fs-3 d-block mb-2"></i>
                        <h6 class="text-muted mb-1">Đơn chờ xác nhận</h6>
                        <h4 class="mb-0" th:text="${stats.donChoXacNhan}">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body py-4 text-center">
                        <i class="bi bi-truck text-primary fs-3 d-block mb-2"></i>
                        <h6 class="text-muted mb-1">Đơn đang giao</h6>
                        <h4 class="mb-0" th:text="${stats.donDangGiao}">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body py-4 text-center">
                        <i class="bi bi-check-circle-fill text-success fs-3 d-block mb-2"></i>
                        <h6 class="text-muted mb-1">Đơn hoàn thành</h6>
                        <h4 class="mb-0" th:text="${stats.donHoanThanh}">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3 col-md-6">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body py-4 text-center">
                        <i class="bi bi-slash-circle text-secondary fs-3 d-block mb-2"></i>
                        <h6 class="text-muted mb-1">SP ngừng bán</h6>
                        <h4 class="mb-0" th:text="${stats.sanPhamNgungBan}">0</h4>
                    </div>
                </div>
            </div>
        </section>

        <section class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">Truy cập nhanh</h4>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2">
                            <button type="button" class="btn btn-outline-primary btn-admin-page"
                                    th:data-url="@{/legoshop/admin/danhmuc}">
                                <i class="bi bi-stack me-1"></i> Danh mục
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-admin-page"
                                    th:data-url="@{/legoshop/admin/sanpham}">
                                <i class="bi bi-box-seam me-1"></i> Sản phẩm
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-admin-page"
                                    th:data-url="@{/legoshop/admin/sanpham/tonkho}">
                                <i class="bi bi-archive me-1"></i> Tồn kho
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-admin-page"
                                    th:data-url="@{/legoshop/admin/sanpham/anhsanpham}">
                                <i class="bi bi-images me-1"></i> Ảnh sản phẩm
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
