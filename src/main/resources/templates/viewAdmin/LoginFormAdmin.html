<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .login-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2d6e 0%, #1565c0 50%, #1e88e5 100%);
            position: relative;
            overflow: hidden;
        }

        .login-bg::before {
            content: '';
            position: fixed;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: #42a5f5;
            opacity: .12;
            top: -140px;
            right: -120px;
            pointer-events: none;
        }

        .login-bg::after {
            content: '';
            position: fixed;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: #e3f2fd;
            opacity: .10;
            bottom: -100px;
            left: -80px;
            pointer-events: none;
        }

        .login-card {
            border: none;
            border-radius: 20px !important;
            box-shadow: 0 8px 32px rgba(10,45,110,.25), 0 2px 8px rgba(10,45,110,.1);
            animation: slideUp .5s cubic-bezier(.22,.88,.36,1) both;
            overflow: hidden;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px) scale(.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-top-bar {
            height: 5px;
            background: linear-gradient(90deg, #0a2d6e, #42a5f5);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: linear-gradient(145deg, #1565c0, #42a5f5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 6px 20px rgba(21,101,192,.35);
        }

        .brand-icon i {
            color: #fff;
            font-size: 26px;
        }

        .card-title {
            color: #0a2d6e;
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: -.2px;
        }

        .form-label {
            font-size: .78rem;
            font-weight: 600;
            color: #0a2d6e;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 5px;
        }

        .input-group-text {
            background: #e3f2fd;
            border: 1.5px solid #cfd8dc;
            border-right: none;
            color: #1e88e5;
            border-radius: 10px 0 0 10px !important;
        }

        .form-control {
            border: 1.5px solid #cfd8dc;
            border-left: none;
            border-radius: 0 10px 10px 0 !important;
            height: 46px;
            font-size: .93rem;
            color: #0a2d6e;
            background: #fafcff;
        }

        .form-control::placeholder {
            color: #b0bec5;
        }

        .form-control:focus {
            border-color: #1e88e5;
            box-shadow: 0 0 0 3px rgba(30,136,229,.13);
            background: #fff;
            outline: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: #1e88e5;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 0;
            color: #90a4ae;
            cursor: pointer;
            z-index: 5;
            transition: color .2s;
        }

        .toggle-pw:hover,
        .toggle-pw:focus {
            color: #1e88e5;
        }

        .alert-error {
            font-size: .84rem;
            border-radius: 10px;
            background: #ffebee;
            color: #c62828;
            border: none;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-success {
            font-size: .84rem;
            border-radius: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            border: none;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #1565c0 0%, #1e88e5 100%);
            color: #fff;
            font-size: .97rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            letter-spacing: .2px;
            box-shadow: 0 6px 18px rgba(21,101,192,.38);
            transition: transform .15s, box-shadow .15s, filter .15s;
        }

        .btn-login:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: 0 10px 26px rgba(21,101,192,.42);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(21,101,192,.3);
        }

        .divider {
            border-color: #e0e9f5;
            margin: 24px 0 20px;
        }

        .contact-box {
            background: #e3f2fd;
            border-radius: 12px;
            padding: 14px 18px;
        }

        .contact-box p {
            margin: 0;
            font-size: .86rem;
            color: #1565c0;
            font-weight: 500;
        }

        .contact-box a {
            display: inline-block;
            margin-top: 4px;
            font-size: .92rem;
            font-weight: 700;
            color: #0a2d6e;
            text-decoration: none;
        }

        .contact-box a:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .card-body {
                padding: 2rem !important;
            }

            .card-title {
                font-size: 1.35rem;
            }
        }
    </style>
</head>

<body>

<form th:action="@{/do-login}" method="post" class="login-bg d-flex align-items-center">


    <input type="hidden"
           th:if="${_csrf != null}"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">

    <section class="w-100">
        <div class="container py-4">
            <div class="row justify-content-center align-items-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">

                    <div class="card login-card">

                        <div class="card-top-bar"></div>

                        <div class="card-body p-5 text-center">

                            <div class="brand-icon">
                                <i class="bi bi-shield-lock-fill"></i>
                            </div>

                            <h3 class="card-title mb-1">Đăng nhập</h3>
                            <p class="text-muted mb-4" style="font-size:.84rem;">
                          Hệ thống quản trị website bán Lego online
                            </p>

                            <div class="alert-error mb-3"
                                 th:if="${param.error}"
                                 role="alert"
                                 aria-live="polite">
                                <i class="bi bi-exclamation-circle-fill"></i>
                                <span>Sai tài khoản hoặc mật khẩu</span>
                            </div>

                            <div class="alert-success mb-3"
                                 th:if="${param.logout}"
                                 role="alert"
                                 aria-live="polite">
                                <i class="bi bi-check-circle-fill"></i>
                                <span>Đã đăng xuất thành công</span>
                            </div>

                            <div class="mb-3 text-start">
                                <label class="form-label" for="username">
                                    Tài khoản
                                </label>

                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person-fill"></i>
                                    </span>

                                    <input class="form-control"
                                           id="username"
                                           type="text"
                                           name="username"
                                           placeholder="Nhập email hoặc số điện thoại"
                                           autocomplete="username"
                                           autofocus
                                           required>
                                </div>
                            </div>

                            <div class="mb-4 text-start">
                                <label class="form-label" for="password">
                                    Mật khẩu
                                </label>

                                <div class="input-group position-relative">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock-fill"></i>
                                    </span>

                                    <input class="form-control pe-5"
                                           type="password"
                                           id="password"
                                           name="password"
                                           placeholder="Nhập mật khẩu"
                                           autocomplete="current-password"
                                           required>

                                    <button type="button"
                                            id="togglePwBtn"
                                            class="toggle-pw"
                                            onclick="togglePassword()"
                                            aria-label="Hiện mật khẩu"
                                            title="Hiện hoặc ẩn mật khẩu"
                                            aria-pressed="false">
                                        <i class="bi bi-eye-fill" id="eyeIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <button class="btn btn-login" type="submit">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Đăng nhập
                            </button>

                            <hr class="divider">

                            <div class="contact-box">
                                <p>
                                    <i class="bi bi-info-circle me-1"></i>
                                    Liên hệ admin nếu bạn quên mật khẩu
                                </p>

                                <a href="tel:+84123456789">
                                    <i class="bi bi-telephone-fill me-1"></i>
                                    +84 123 456 789
                                </a>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const toggleButton = document.getElementById('togglePwBtn');

        const isPasswordHidden = passwordInput.type === 'password';

        passwordInput.type = isPasswordHidden ? 'text' : 'password';

        eyeIcon.classList.toggle('bi-eye-fill', !isPasswordHidden);
        eyeIcon.classList.toggle('bi-eye-slash-fill', isPasswordHidden);

        toggleButton.setAttribute('aria-pressed', String(isPasswordHidden));
        toggleButton.setAttribute(
            'aria-label',
            isPasswordHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'
        );
    }
</script>

</body>
</html>
