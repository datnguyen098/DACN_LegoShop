<div xmlns:th="http://www.thymeleaf.org">
	<div id="main">
		<div class="product-editor-page w-full min-h-screen p-4 sm:p-6 lg:p-8 flex flex-col justify-start items-stretch">
			<div class="product-editor-header">
				<div>
					<p class="product-editor-eyebrow">Quản lý sản phẩm</p>
					<h3>Sửa sản phẩm LEGO</h3>
					<p>Cập nhật thông tin chi tiết sản phẩm, giá bán, thông số và hình ảnh.</p>
				</div>

				<button type="button"
						class="btn product-editor-back btn-admin-page"
						th:data-url="@{/legoshop/admin/sanpham}">
					<i class="bi bi-arrow-left"></i>
					Quay lại
				</button>
			</div>

			<section class="product-editor-card">
				<div class="product-editor-card-header">
					<div class="product-editor-card-icon">
						<i class="bi bi-box-seam"></i>
					</div>
					<div>
						<h4>Thông tin sản phẩm</h4>
						<p>Các trường có dấu * là thông tin quan trọng.</p>
					</div>
				</div>

				<form class="form form-ajax product-editor-form"
					  th:action="@{/legoshop/admin/sanpham/edit}"
					  data-ajax-url="/legoshop/admin/sanpham/edit/ajax"
					  method="post"
					  th:object="${model}"
					  enctype="multipart/form-data">

					<input type="hidden" th:field="*{id}">

					<div class="product-editor-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 w-full">
						<div class="product-editor-two-col col-span-1 md:col-span-2 lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-5">
							<div class="w-100">
								<label class="product-editor-label">Danh mục <span>*</span></label>
								<select class="form-select product-editor-control" th:field="*{danhMuc.id}">
									<option value="">-- Chọn danh mục --</option>
									<option th:each="dm : ${list}"
											th:value="${dm.id}"
											th:text="${dm.tenDanhMuc}"></option>
								</select>
							</div>

							<div class="w-100">
								<label class="product-editor-label">Mã Sản Phẩm <span>*</span></label>
								<div class="product-editor-input-wrap">
									<i class="bi bi-upc-scan"></i>
									<input type="text"
										   class="form-control product-editor-control"
										   placeholder="Mã Sản Phẩm"
										   th:field="*{maSanPham}">
								</div>
								<span class="text-danger"
									  th:if="${#fields.hasErrors('maSanPham')}"
									  th:errors="*{maSanPham}"></span>
							</div>
						</div>

						<div class="product-editor-span-full col-span-1 md:col-span-2 lg:col-span-3">
							<label class="product-editor-label">Tên Sản Phẩm <span>*</span></label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-box"></i>
								<input type="text"
									   class="form-control product-editor-control"
									   placeholder="Tên Sản Phẩm"
									   th:field="*{tenSanPham}">
							</div>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('tenSanPham')}"
								  th:errors="*{tenSanPham}"></span>
						</div>

						<div class="product-editor-span-full col-span-1 md:col-span-2 lg:col-span-3">
							<label class="product-editor-label">Mô Tả</label>
							<textarea class="form-control product-editor-control product-editor-textarea"
									  placeholder="Mô Tả"
									  th:field="*{moTa}"></textarea>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('moTa')}"
								  th:errors="*{moTa}"></span>
						</div>

						<div>
							<label class="product-editor-label">Giá bán <span>*</span></label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-tag"></i>
								<input type="number"
									   class="form-control product-editor-control"
									   placeholder="Giá"
									   th:field="*{gia}">
							</div>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('gia')}"
								  th:errors="*{gia}"></span>
						</div>

						<div>
							<label class="product-editor-label">Giá gốc nếu có</label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-cash-stack"></i>
								<input type="number"
									   class="form-control product-editor-control"
									   placeholder="Giá gốc"
									   th:field="*{giaGoc}">
							</div>
						</div>

						<div>
							<label class="product-editor-label">Chủ đề Theme LEGO</label>
							<select class="form-select product-editor-control" th:field="*{chuDe}">
								<option value="">-- Chọn chủ đề --</option>
								<option value="Technic">Technic</option>
								<option value="Star Wars">Star Wars</option>
								<option value="City">City</option>
								<option value="Creator">Creator</option>
								<option value="Icons">Icons</option>
								<option value="Speed Champions">Speed Champions</option>
							</select>
						</div>

						<div>
							<label class="product-editor-label">Độ Tuổi Tối Thiểu</label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-person"></i>
								<input type="text"
									   class="form-control product-editor-control"
									   placeholder="Độ Tuổi Tối Thiểu"
									   th:field="*{doTuoiToiThieu}">
							</div>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('doTuoiToiThieu')}"
								  th:errors="*{doTuoiToiThieu}"></span>
						</div>

						<div>
							<label class="product-editor-label">Số mảnh ghép</label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-puzzle"></i>
								<input type="number"
									   class="form-control product-editor-control"
									   placeholder="Số Mảnh"
									   th:field="*{soManh}">
							</div>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('soManh')}"
								  th:errors="*{soManh}"></span>
						</div>

						<div>
							<label class="product-editor-label">Năm phát hành</label>
							<div class="product-editor-input-wrap">
								<i class="bi bi-calendar3"></i>
								<input type="number"
									   class="form-control product-editor-control"
									   placeholder="Năm Phát Hành"
									   th:field="*{namPhatHanh}">
							</div>
							<span class="text-danger"
								  th:if="${#fields.hasErrors('namPhatHanh')}"
								  th:errors="*{namPhatHanh}"></span>
						</div>

						<div class="product-editor-span-full col-span-1 md:col-span-2 lg:col-span-3">
							<label class="product-editor-label">Hình ảnh sản phẩm</label>

							<label for="fileAnh" class="product-main-image-card">
								<span class="product-main-image-icon">
									<i class="bi bi-image"></i>
								</span>
								<span class="product-main-image-title">Ảnh chính sản phẩm</span>
								<span class="product-main-image-desc">
									Kéo thả ảnh vào đây hoặc bấm để chọn ảnh
								</span>
								<span class="product-main-image-note">
									PNG, JPG, WEBP tối đa 5MB
								</span>
							</label>

							<input type="file" id="fileAnh" class="form-control product-main-image-input"
								   name="fileAnh">
						</div>
					</div>

					<div class="product-editor-actions">
						<button type="button"
								class="btn product-editor-cancel btn-admin-page"
								th:data-url="@{/legoshop/admin/sanpham}">
							<i class="bi bi-x-lg"></i>
							Hủy
						</button>
						<button type="submit" class="btn product-editor-save">
							<i class="bi bi-save"></i>
							Cập nhật sản phẩm
						</button>
					</div>
				</form>
			</section>
		</div>
	</div>
</div>
