<div id="main" xmlns:th="http://www.thymeleaf.org">
    <header class="mb-3">
        <a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a>
    </header>

    <div class="page-heading">
        <div class="page-title">
            <div class="row">
                <div class="col-12 col-md-6 order-md-1 order-last">
                    <h3>Kho ảnh phụ</h3>
                </div>
                <div class="col-12 col-md-6 order-md-2 order-first">
                    <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <button type="button" class="btn btn-link p-0 admin-nav-link" th:data-url="@{/legoshop/admin}">Admin</button>
                            </li>
                            <li class="breadcrumb-item">
                                <button type="button" class="btn btn-link p-0 admin-nav-link" th:data-url="@{/legoshop/admin/sanpham/anhsanpham}">Ảnh SP</button>
                            </li>
                            <li class="breadcrumb-item active">Kho ảnh</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
        <section class="section">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex flex-wrap align-items-center gap-2">
                        <button type="button" class="btn btn-primary btn-admin-page"
                                th:data-url="@{/legoshop/admin/sanpham/anhsanpham}">
                            <i class="bi bi-arrow-left"></i> Trở lại
                        </button>

                        <form id="uploadAnhForm" class="mb-0 form-ajax"
                              th:action="@{/legoshop/admin/sanpham/anhsanpham/uploadanh}"
                              data-ajax-url="/legoshop/admin/sanpham/anhsanpham/uploadanh/ajax"
                              method="post" enctype="multipart/form-data">
                            <input type="hidden" name="sanPhamId" th:value="${sanPhamId}">
                            <label class="btn btn-success mb-0">
                                <i class="bi bi-cloud-upload"></i> Thêm ảnh phụ
                                <input type="file" name="file" accept="image/*" class="d-none" id="uploadAnhInput">
                            </label>
                        </form>

                        <button type="button" class="btn btn-warning" id="btnToggleSelect">
                            <i class="bi bi-check2-square"></i> Chọn ảnh
                        </button>
                        <form id="deleteForm" class="d-inline form-ajax mb-0"
                              th:action="@{/legoshop/admin/sanpham/anhsanpham/deleteanh}"
                              data-ajax-url="/legoshop/admin/sanpham/anhsanpham/deleteanh/ajax"
                              method="post">
                            <input type="hidden" name="sanPhamId" th:value="${sanPhamId}">
                            <button type="submit" id="deleteBtn" class="btn btn-danger d-none">
                                <i class="bi bi-trash"></i> Xóa đã chọn
                            </button>
                        </form>
                    </div>

                    <div class="row g-3 mt-3" id="anhGrid" th:if="${list != null and !list.isEmpty()}">
                        <div class="col-6 col-md-4 col-lg-3" th:each="anh : ${list}">
                            <div class="position-relative border rounded p-1">
                                <input type="checkbox"
                                       class="form-check-input position-absolute top-0 start-0 m-2 d-none img-checkbox"
                                       th:value="${anh.id}">
                                <img th:src="@{/uploads/{f}(f=${anh.duongDanAnh})}"
                                     class="img-fluid rounded w-100 btn-preview-img"
                                     style="height:140px; object-fit:cover; cursor:pointer;"
                                     th:attr="data-src=@{/uploads/{f}(f=${anh.duongDanAnh})}">
                            </div>
                        </div>
                    </div>

                    <p class="text-center text-muted mt-4"
                       th:if="${list == null or list.isEmpty()}">
                        Chưa có ảnh phụ. Bấm <strong>Thêm ảnh phụ</strong> để tải lên.
                    </p>
                </div>
            </div>
        </section>
    </div>

    <div class="modal fade" id="imageModal">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0 p-0">
                <img id="previewImg" class="img-fluid" style="max-width:90vw;max-height:90vh;object-fit:contain;">
            </div>
        </div>
    </div>

    <script>
        (function initKhoAnhPhu() {
            const uploadInput = document.getElementById('uploadAnhInput');
            const uploadForm = document.getElementById('uploadAnhForm');
            if (uploadInput && uploadForm) {
                uploadInput.addEventListener('change', function () {
                    if (this.files && this.files.length > 0) {
                        uploadForm.requestSubmit();
                    }
                });
            }

            document.querySelectorAll('.btn-preview-img').forEach(function (img) {
                img.addEventListener('click', function () {
                    document.getElementById('previewImg').src = this.dataset.src || this.src;
                    new bootstrap.Modal(document.getElementById('imageModal')).show();
                });
            });

            const btnToggle = document.getElementById('btnToggleSelect');
            const deleteBtn = document.getElementById('deleteBtn');
            if (btnToggle) {
                btnToggle.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelectorAll('.img-checkbox').forEach(function (cb) {
                        cb.classList.toggle('d-none');
                        cb.checked = false;
                    });
                    if (deleteBtn) deleteBtn.classList.toggle('d-none');
                });
            }

            const deleteForm = document.getElementById('deleteForm');
            if (deleteForm) {
                deleteForm.addEventListener('submit', function (e) {
                    const selected = Array.from(document.querySelectorAll('.img-checkbox:checked'))
                        .map(function (cb) { return cb.value; })
                        .filter(Boolean);
                    if (selected.length === 0) {
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        alert('Vui lòng chọn ít nhất 1 ảnh để xóa.');
                        return;
                    }
                    if (!confirm('Bạn có chắc chắn muốn xóa ảnh đã chọn?')) {
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        return;
                    }
                    deleteForm.querySelectorAll('input[name="anhIds"]').forEach(function (n) { n.remove(); });
                    selected.forEach(function (id) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'anhIds';
                        input.value = id;
                        deleteForm.appendChild(input);
                    });
                }, true);
            }
        })();
    </script>
</div>
