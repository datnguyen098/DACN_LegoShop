<div id="main" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="/assets/vendors/simple-datatables/style.css">
</head>
	<header class="mb-3">
		<a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a>
	</header>

	<div class="page-heading">
		<div class="page-title">
			<div class="row">
				<div class="col-12 col-md-6 order-md-1 order-last">
					<h3>Sản Phẩm</h3>
				</div>
				<div class="col-12 col-md-6 order-md-2 order-first">
					<nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
						<ol class="breadcrumb">
							<li class="breadcrumb-item">
								<button type="button" class="btn btn-link p-0 admin-nav-link" th:data-url="@{/legoshop/admin}">Admin</button>
							</li>
							<li class="breadcrumb-item active" aria-current="page">Sản Phẩm</li>
						</ol>
					</nav>
				</div>
			</div>
		</div>
		<section class="section">
			<div class="card">
				<div class="card-header">Sản Phẩm</div>
				<div class="card-body">
					<button type="button" class="btn btn-success btn-admin-page"
							th:data-url="@{/legoshop/admin/sanpham/add}">
						Thêm Sản Phẩm
					</button>

					<table class="table table-striped" id="table1" style="overflow-x: auto;">
						<thead>
							<tr>
								<th>STT</th>
								<th>Mã SP</th>
								<th>Tên SP</th>
								<th>Danh Mục</th>
								<th>Giá</th>
								<th>Ảnh chính</th>
								<th>Trạng Thái</th>
								<th>Hành Động</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${#lists.isEmpty(list)}">
								<td colspan="8" class="text-center text-muted py-4">
									Chưa có sản phẩm. Bấm <strong>Thêm Sản Phẩm</strong> để tạo mới.
								</td>
							</tr>
							<tr th:each="sp, stt : ${list}">
								<td th:text="${stt.count}"></td>
								<td th:text="${sp.maSanPham}"></td>
								<td th:text="${sp.tenSanPham}"></td>
								<td th:text="${sp.danhMuc != null ? sp.danhMuc.tenDanhMuc : '—'}"></td>
								<td th:text="${sp.gia}"></td>
								<td>
									<img th:if="${sp.AnhChinh != null}" alt=""
										 width="80" height="80"
										 th:src="@{/uploads/{src}(src=${sp.AnhChinh})}"
										 class="img-fluid border-2 btn-preview-img"
										 style="object-fit:cover; cursor:pointer;"
										 th:attr="data-src=@{/uploads/{src}(src=${sp.AnhChinh})}">
								</td>
								<td th:text="${sp.trangThai == 'DANG_BAN' ? 'Đang Bán' : 'Ngừng Bán'}"></td>
								<td class="text-nowrap">
									<button type="button"
											th:attr="data-id=${sp.id}"
											th:text="${sp.trangThai == 'DANG_BAN'} ? 'Ẩn' : 'Hiện'"
											th:classappend="${sp.trangThai == 'DANG_BAN'} ? 'btn-warning' : 'btn-success'"
											class="btn btn-toggle-status">
									</button>
									<button type="button" class="btn btn-secondary btn-admin-page"
											th:data-url="@{/legoshop/admin/sanpham/edit/{id}(id=${sp.id})}">
										Sửa
									</button>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
	</div>

	<div class="modal fade" id="imageModal">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content bg-transparent border-0 p-0">
				<img id="previewImg" class="img-fluid" style="max-width:90vw;max-height:90vh;object-fit:contain;">
			</div>
		</div>
	</div>

	<script src="/assets/vendors/simple-datatables/simple-datatables.js"></script>
	<script>
		document.querySelectorAll('.btn-preview-img').forEach(function (img) {
			img.addEventListener('click', function () {
				document.getElementById('previewImg').src = this.dataset.src || this.src;
				new bootstrap.Modal(document.getElementById('imageModal')).show();
			});
		});
		if (typeof initAdminPage === 'function') initAdminPage();
	</script>
</div>
