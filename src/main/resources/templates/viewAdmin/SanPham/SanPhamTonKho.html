<div id="main" xmlns:th="http://www.thymeleaf.org">
	<header class="mb-3">
		<a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a>
	</header>

	<div class="page-heading">
		<div class="page-title">
			<div class="row">
				<div class="col-12 col-md-6 order-md-1 order-last">
					<h3>Quản lý tồn kho</h3>
				</div>
				<div class="col-12 col-md-6 order-md-2 order-first">
					<nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
						<ol class="breadcrumb">
							<li class="breadcrumb-item">
								<button type="button" class="btn btn-link p-0 admin-nav-link" th:data-url="@{/legoshop/admin}">Admin</button>
							</li>
							<li class="breadcrumb-item active">Tồn kho</li>
						</ol>
					</nav>
				</div>
			</div>
		</div>
		<section class="section">
			<div class="card">
				<div class="card-header">Tồn kho sản phẩm</div>
				<div class="card-body">
					<table class="table table-striped" id="table1">
						<thead>
							<tr>
								<th>STT</th>
								<th>Tên sản phẩm</th>
								<th>Số lượng tồn</th>
								<th>Số lượng giữ</th>
								<th>Trạng thái</th>
								<th>Nhập thêm</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${#lists.isEmpty(list)}">
								<td colspan="6" class="text-center text-muted py-4">Chưa có dữ liệu tồn kho.</td>
							</tr>
							<tr th:each="tk, stt : ${list}" th:attr="data-sanpham-id=${tk.sanPham.id}">
								<td th:text="${stt.count}"></td>
								<td th:text="${tk.sanPham.tenSanPham}"></td>
								<td class="cell-so-luong-ton" th:text="${tk.soLuongTon}"></td>
								<td th:text="${tk.soLuongGiu}"></td>
								<td th:text="${tk.sanPham.trangThai == 'DANG_BAN' ? 'Đang bán' : 'Ngừng bán'}"></td>
								<td>
									<form th:action="@{/legoshop/admin/sanpham/tonkho/nhap}"
										  method="post"
										  class="d-flex gap-2 form-ajax form-tonkho-nhap"
										  data-ajax-url="/legoshop/admin/sanpham/tonkho/nhap/ajax">
										<input type="hidden" name="sanPhamId" th:value="${tk.sanPham.id}" />
										<input type="number" class="form-control" name="soLuongNhap" min="1"
											   placeholder="SL nhập..." style="width: 140px" required />
										<button type="submit" class="btn btn-primary text-nowrap">
											<i class="bi bi-plus-lg"></i> Nhập
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
	</div>

	<script src="/assets/vendors/simple-datatables/simple-datatables.js"></script>
	<script>
		if (typeof initAdminPage === 'function') initAdminPage();
	</script>
</div>
