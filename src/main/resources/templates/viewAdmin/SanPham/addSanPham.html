<div xmlns:th="http://www.thymeleaf.org">
	<div id="main">
		<header class="mb-3">
			<a href="#" class="burger-btn d-block d-xl-none">
				<i class="bi bi-justify fs-3"></i>
			</a>
		</header>

		<div class="page-heading">
			<div class="page-title">
				<div class="row">
					<div class="col-12 col-md-6 order-md-1 order-last">
						<h3>Thêm Sản Phẩm</h3>
						<p class="text-subtitle text-muted">Multiple form layout you can use</p>
					</div>
					<div class="col-12 col-md-6 order-md-2 order-first">
						<nav aria-label="breadcrumb"
							 class="breadcrumb-header float-start float-lg-end">
							<ol class="breadcrumb">
								<li class="breadcrumb-item">
									<a th:href="@{/legoshop/admin}">Dashboard</a>
								</li>
								<li class="breadcrumb-item">
									<a th:href="@{/legoshop/admin/sanpham}">Sản Phẩm</a>
								</li>
								<li class="breadcrumb-item active" aria-current="page">
									Thêm Sản Phẩm
								</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>

			<section id="multiple-column-form">
				<div class="row match-height">
					<div class="col-12">
						<div class="card">
							<div class="card-header">
								<h4 class="card-title">Multiple Column</h4>
							</div>
							<div class="card-content">
								<div class="card-body">
									<form class="form"
										  th:action="@{/legoshop/admin/sanpham/store}"
										  enctype="multipart/form-data"
										  method="post"
										  th:object="${model}">

										<div class="row">
											<div class="col-md-12 col-12">

												<div class="form-group">
													<label>Danh mục</label>
													<select class="form-select"
															th:field="*{danhMuc.id}">
														<option value="">-- Chọn danh mục --</option>
														<option th:each="dm : ${list}"
																th:value="${dm.id}"
																th:text="${dm.tenDanhMuc}"></option>
													</select>
												</div>

												<div class="form-group">
													<label>Mã Sản Phẩm</label>
													<input type="text"
														   class="form-control"
														   placeholder="Mã Sản Phẩm"
														   th:field="*{maSanPham}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('maSanPham')}"
														  th:errors="*{maSanPham}"></span>
												</div>

												<div class="form-group">
													<label>Tên Sản Phẩm</label>
													<input type="text"
														   class="form-control"
														   placeholder="Tên Sản Phẩm"
														   th:field="*{tenSanPham}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('tenSanPham')}"
														  th:errors="*{tenSanPham}"></span>
												</div>

												<div class="form-group">
													<label>Đường Dẫn</label>
													<input type="text"
														   class="form-control"
														   placeholder="Đường Dẫn"
														   th:field="*{duongDan}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('duongDan')}"
														  th:errors="*{duongDan}"></span>
												</div>

												<div class="form-group">
													<label>Mô Tả</label>
													<input type="text"
														   class="form-control"
														   placeholder="Mô Tả"
														   th:field="*{moTa}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('moTa')}"
														  th:errors="*{moTa}"></span>
												</div>

												<div class="form-group">
													<label>Giá</label>
													<input type="number"
														   class="form-control"
														   placeholder="Giá"
														   th:field="*{gia}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('gia')}"
														  th:errors="*{gia}"></span>
												</div>

												<div class="form-group">
													<label>Độ Tuổi Tối Thiểu</label>
													<input type="text"
														   class="form-control"
														   placeholder="Độ Tuổi Tối Thiểu"
														   th:field="*{doTuoiToiThieu}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('doTuoiToiThieu')}"
														  th:errors="*{doTuoiToiThieu}"></span>
												</div>

												<div class="form-group">
													<label>Số Mảnh</label>
													<input type="number"
														   class="form-control"
														   placeholder="Số Mảnh"
														   th:field="*{soManh}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('soManh')}"
														  th:errors="*{soManh}"></span>
												</div>

												<div class="form-group">
													<label>Năm Phát Hành</label>
													<input type="number"
														   class="form-control"
														   placeholder="Năm Phát Hành"
														   th:field="*{namPhatHanh}">
													<span class="text-danger"
														  th:if="${#fields.hasErrors('namPhatHanh')}"
														  th:errors="*{namPhatHanh}"></span>
												</div>

												<div class="form-group">
													<label>Ảnh Chính</label>
													<input type="file" name="file"
														   class="form-control" required>
												</div>

											</div>

											<div class="col-12 d-flex justify-content-end">
												<button type="submit"
														class="btn btn-primary me-1 mb-1">
													Submit
												</button>
												<button type="reset"
														class="btn btn-light-secondary me-1 mb-1">
													Reset
												</button>
											</div>

										</div>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>

		</div>
	</div>
</div>
