<div id="main" xmlns:th="http://www.thymeleaf.org">
    <header class="mb-3">
        <a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a>
    </header>

    <div class="page-heading">
        <div class="page-title">
            <div class="row">
                <div class="col-12 col-md-6 order-md-1 order-last">
                    <h3>Quản lý ảnh sản phẩm</h3>
                </div>
                <div class="col-12 col-md-6 order-md-2 order-first">
                    <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <button type="button" class="btn btn-link p-0 admin-nav-link" th:data-url="@{/legoshop/admin}">Admin</button>
                            </li>
                            <li class="breadcrumb-item active">Ảnh sản phẩm</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>

        <section class="section">
            <div class="card">
                <div class="card-header">Danh sách ảnh theo sản phẩm</div>
                <div class="card-body">
                    <table class="table table-striped align-middle" id="table1">
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên sản phẩm</th>
                                <th>Ảnh chính</th>
                                <th>Kho ảnh phụ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(list)}">
                                <td colspan="4" class="text-center text-muted py-4">Chưa có sản phẩm.</td>
                            </tr>
                            <tr th:each="sp, stt : ${list}">
                                <td th:text="${stt.count}"></td>
                                <td th:text="${sp.tenSanPham}"></td>
                                <td>
                                    <img th:if="${sp.AnhChinh != null}"
                                         th:src="@{/uploads/{f}(f=${sp.AnhChinh})}"
                                         style="width:60px;height:60px;object-fit:cover;border-radius:6px" alt="">
                                    <span th:unless="${sp.AnhChinh != null}" class="text-muted small">—</span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-success btn-admin-page"
                                            th:data-url="@{/legoshop/admin/sanpham/anhsanpham/khoanh/{id}(id=${sp.id})}">
                                        <i class="bi bi-images"></i> Kho ảnh
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="/assets/vendors/simple-datatables/simple-datatables.js"></script>
    <script>
        if (typeof initAdminPage === 'function') initAdminPage();
    </script>
</div>
